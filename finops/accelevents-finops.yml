meters:
- name: platform_subscription
  description: Annual platform subscription fee by tier (Professional, Business, Enterprise, White Label).
  unit: subscription
  aggregation: sum
  dimensions:
  - account
  - plan
- name: registrants
  description: Registrants/tickets processed per event; may drive registrant-based or transaction fees depending on plan.
  unit: registrants
  aggregation: sum
  dimensions:
  - account
  - event
- name: transaction_value
  description: Ticketing transaction value on which percentage fees may apply under transactional pricing.
  unit: currency
  aggregation: sum
  dimensions:
  - account
  - event
principles:
- name: Visibility
  description: Track the platform subscription tier and per-event registrant volumes; API access rides on the subscription with no separate call charge.
- name: Allocation
  description: Map the subscription and per-event fees to the teams and events consuming the platform and its API.
- name: Optimization
  description: Right-size the subscription tier to needed features (API access starts at Business); consolidate events under an unlimited-events tier when volume justifies it.
- name: Accountability
  description: Assign an owner for the Accelevents account and review annual subscription plus per-event registrant costs against budget.

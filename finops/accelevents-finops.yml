description: >-
  FinOps view of Accelevents spend. Accelevents is billed as a SaaS event
  management and ticketing subscription (Professional, Business, Enterprise,
  White Label), not as a metered API product. The Open API and webhooks are a
  feature bundled into the paid tiers (Business and above), so API usage itself
  carries no separate per-call charge - the cost driver is the platform
  subscription plus any registrant-based, add-on, or transaction fees tied to
  running events. Enterprise and White Label are custom-quoted.
notes: >-
  Per-unit registrant/transaction rates are not reconciled here and are drawn
  from third-party summaries; verify on the Accelevents pricing page. Because API
  access is subscription-bundled, allocate its cost to the platform subscription
  and to the events/teams consuming it rather than to API call volume.

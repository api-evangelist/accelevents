aid: accelevents
name: Accelevents
review:
  question: Does Accelevents expose a documented public WebSocket API?
  answer: false
  date: '2026-07-05'
  reviewer: API Evangelist
  asyncapiSpecCreated: false
  asyncapiScopeNote: |
    No AsyncAPI document was authored. Accelevents' documented public developer
    surface (the Open API at https://api.accelevents.com/rest) is request/response
    REST over HTTPS. Real-time behavior inside the Accelevents virtual/hybrid
    event experience (live streams, chat, networking) is delivered through the
    hosted web/mobile application, not through a documented public WebSocket or
    SSE endpoint that a third-party integrator can subscribe to. The only
    documented event-driven integration surface is outbound webhooks, which are
    server-to-endpoint HTTP callbacks, not a WebSocket transport.
findings:
  summary: |
    Accelevents does not publish a documented public WebSocket API. Accelevents
    is an event management and ticketing platform. Its public developer offering
    is the Accelevents Open API, a REST API with base URL
    https://api.accelevents.com/rest, authenticated with an organization API key
    generated from the account Integrations tab (Edit Enterprise -> Integrations
    -> API Key) and passed in a request header (the getting-started guide refers
    to an "AUTHENTICATION" header). The reference at
    https://developer.accelevents.com/reference documents REST endpoints across
    events, attendees/people, ticketing orders and sales, ticket holders,
    sessions, speakers, and attendee networking. API and webhook access is a
    paid-plan feature (Business tier and above). No realtime, bidirectional, or
    streaming WebSocket (ws:// or wss://) endpoint is documented on the
    Accelevents public API as of the review date.
  accessModel: |
    The Open API is documented publicly at developer.accelevents.com, but
    exercising it requires an API key that can only be generated by an
    owner-level user on a qualifying paid plan (API and webhooks are bundled from
    the Business tier upward). Several operations named in the reference object
    catalog (Session, Speaker, Ticket Holder, Portal People) did not have their
    exact request paths verified from the public pages; those are modeled in the
    OpenAPI/collections and flagged with x-endpoint-modeled: true. Three paths
    were confirmed directly from the public reference (event details, all
    attendees, ticketing orders).
  transports:
    - protocol: REST
      scheme: https
      baseURL: https://api.accelevents.com/rest
      documented: true
      note: The Accelevents Open API. Request/response REST over HTTPS, API-key auth via request header.
    - protocol: Webhook
      scheme: https
      documented: true
      note: API & Webhooks are a bundled paid-plan feature; webhooks are outbound server-to-endpoint HTTP callbacks, not a WebSocket.
    - protocol: WebSocket
      scheme: wss
      documented: false
      note: No WebSocket endpoint is documented anywhere in the Accelevents public API reference as of the review date.
  endpointsConfirmedRest:
    - GET    https://api.accelevents.com/rest/host/event/{eventUrl}/eventDetails
    - GET    https://api.accelevents.com/rest/events/{eventUrl}/staff/allAttendees
    - GET    https://api.accelevents.com/rest/events/{eventUrl}/staff/orders
  endpointsModeled:
    - GET    https://api.accelevents.com/rest/host/event/{eventUrl}/recurringStatus
    - GET    https://api.accelevents.com/rest/events/{eventUrl}/staff/people
    - GET    https://api.accelevents.com/rest/events/{eventUrl}/staff/salesData
    - PATCH  https://api.accelevents.com/rest/events/{eventUrl}/staff/ticketHolders/{barcodeId}
    - POST   https://api.accelevents.com/rest/events/{eventUrl}/staff/exchangeTicketType
    - GET    https://api.accelevents.com/rest/events/{eventUrl}/staff/sessions
    - PATCH  https://api.accelevents.com/rest/events/{eventUrl}/staff/sessions/{sessionId}
    - GET    https://api.accelevents.com/rest/events/{eventUrl}/staff/speakers
    - POST   https://api.accelevents.com/rest/events/{eventUrl}/staff/speakers
sources:
  - url: https://developer.accelevents.com/docs/accelevents-api-documentation
    type: Documentation
    note: Main API documentation portal; object catalog (Event, Attendees, Session, Ticket Holder, etc.). No WebSocket mentioned.
  - url: https://developer.accelevents.com/docs/getting-started
    type: Documentation
    note: API key generated in the account Integrations tab and passed in an AUTHENTICATION header.
  - url: https://developer.accelevents.com/reference
    type: APIReference
    note: REST API reference. All request/response over HTTPS.
  - url: https://developer.accelevents.com/reference/event-and-design-details
    type: APIReference
    note: Confirmed GET /rest/host/event/{eventUrl}/eventDetails.
  - url: https://developer.accelevents.com/reference/get-all-attendees
    type: APIReference
    note: Confirmed GET /rest/events/{eventUrl}/staff/allAttendees.
  - url: https://developer.accelevents.com/reference/get-ticketing-orders
    type: APIReference
    note: Confirmed GET /rest/events/{eventUrl}/staff/orders.
  - url: https://www.accelevents.com/pricing
    type: Pricing
    note: Subscription tiers; API & Webhooks bundled from the Business plan and above.
actions:
  asyncapiPath: null
  apisYmlUpdated: true
  reason: |
    No WebSocket protocol surface exists on the Accelevents public API. The
    documented developer surface is request/response REST (the Open API) plus
    outbound webhooks. No AsyncAPI document was created because there is no
    server-push, client-subscribable transport on Accelevents' own public API to
    model; in-event real-time features are delivered through the hosted
    application rather than a public streaming API.
